baseURL: "https://har-pi.github.io/"
languageCode: "en-us"
title: "harpi — Security Researcher"
description: "Penetration testing, vulnerability research, HackTheBox writeups"
theme: "terminal"

# Build settings
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableGitInfo: true
enableEmoji: true

pagination:
  pagerSize: 20

# Syntax highlighting
PygmentsCodeFences: true
PygmentsStyle: "monokai"

markup:
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    lineNumbersInTable: true
    style: monokai

# Theme parameters
params:
  defaultTheme: "dark"
  enableThemeToggle: true
  themeColor: "green"
  fullWidthTheme: true
  centerTheme: true
  autoCover: true
  contentTypeName: "posts"
  showMenuItems: 3

  # Branding
  homeSubtitle: "Security Researcher | Penetration Tester"
  subtitle: "Security Researcher | Penetration Tester"
  author: "harpi"
  description: "Security researcher, penetration tester"
  keywords:
    - "cybersecurity"
    - "penetration testing"
    - "hack the box"
    - "security research"
    - "ethical hacking"
    - "vulnerability research"
    - "fuzzing"

  logo:
    logoText: "~/harpi"

  favicon: "favicon.png"

  # Social links
  social:
    - name: "github"
      url: "https://github.com/har-pi"
    - name: "hackthebox"
      url: "https://app.hackthebox.com/profile/harpi"

  # Footer
  footer:
    trademark: false
    rss: true
    copyright: false
    author: false

  # Content display
  showFullContent: false
  showShareButtons: false
  showPostNavLinks: false
  showBreadCrumbs: false
  showCodeCopyButtons: true
  showWordCount: false
  showRssButtonInSectionTermList: true
  ReadMore: "Read More →"

  # Table of contents
  useHugoToc: true
  showtoc: true
  tocopen: true
  Toc: true
  TocTitle: "Table of Contents"

  # Reading time
  readingTime: true

  # Disabled features
  comments: false
  disableSpecial1stPost: false
  disableScrollToTop: false

# Navigation
menu:
  main:
    - identifier: "blog"
      name: "⚡ Blog"
      url: "/blog/"
      weight: 20
    - identifier: "research"
      name: "☢ Research"
      url: "/research/"
      weight: 30
    - identifier: "about"
      name: "☣ About"
      url: "/about/"
      weight: 50

# Taxonomies (used for tag/difficulty filtering)
taxonomies:
  tag: "tags"
  category: "categories"
  difficulty: "difficulty"
  platform: "platform"

# Output formats
outputs:
  home: ["HTML", "RSS"]
  page: ["HTML"]
  section: ["HTML", "RSS"]

# Related content
related:
  includeNewer: true
  indices:
    - name: keywords
      weight: 100
    - name: tags
      weight: 80
    - name: date
      weight: 10
  threshold: 20
  toLower: false
